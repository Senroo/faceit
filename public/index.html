<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FACEIT Control Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>

    <main class="shell">
      <header class="topbar card">
        <div>
          <p class="eyebrow">FACEIT Tracker</p>
          <h1 class="topbar-title">Cockpit des joueurs, stats, profils et admin.</h1>
        </div>
        <nav class="topbar-nav">
          <a href="/" data-nav>Vue Generale</a>
          <a href="/admin" data-nav>Admin</a>
        </nav>
        <form id="global-search-form" class="searchbar">
          <input id="global-search-input" placeholder="Chercher un joueur FACEIT" />
          <button type="submit">Ouvrir</button>
        </form>
      </header>

      <section class="hero-strip card" id="hero-strip"></section>

      <section id="overview-view" class="page-view">
        <div id="overview-kpis" class="kpi-grid"></div>
        <section class="layout-two">
          <article class="card">
            <div class="section-head">
              <div>
                <p class="section-tag">Roster</p>
                <h2>Joueurs suivis</h2>
              </div>
              <form id="player-form" class="inline-form">
                <input id="nickname" name="nickname" placeholder="Pseudo FACEIT" />
                <button type="submit">Ajouter</button>
              </form>
            </div>
            <div id="overview-player-grid" class="player-grid"></div>
          </article>

          <article class="card">
            <div class="section-head">
              <div>
                <p class="section-tag">Classement</p>
                <h2>Overall leaderboard</h2>
              </div>
            </div>
            <div id="overview-leaderboard" class="leaderboard"></div>
          </article>
        </section>

        <section class="layout-two">
          <article class="card">
            <div class="section-head">
              <div>
                <p class="section-tag">Overall</p>
                <h2>Vue d'ensemble</h2>
              </div>
            </div>
            <div id="overall-summary" class="summary-grid"></div>
          </article>

          <article class="card">
            <div class="section-head">
              <div>
                <p class="section-tag">Feed</p>
                <h2>Derniers matchs</h2>
              </div>
            </div>
            <div id="overview-feed" class="match-list"></div>
          </article>
        </section>
      </section>

      <section id="player-view" class="page-view" hidden>
        <div id="player-page"></div>
      </section>

      <section id="admin-view" class="page-view" hidden>
        <div class="layout-two">
          <article class="card">
            <div class="section-head">
              <div>
                <p class="section-tag">Admin</p>
                <h2>Configuration</h2>
              </div>
            </div>
            <form id="settings-form" class="stack">
              <label>
                Salon Discord
                <input id="discordChannelId" name="discordChannelId" placeholder="123456789012345678" />
              </label>
              <label>
                Jeu FACEIT
                <input id="gameId" name="gameId" value="cs2" />
              </label>
              <label>
                Intervalle de verification (secondes)
                <input id="pollIntervalSeconds" name="pollIntervalSeconds" type="number" min="30" max="3600" />
              </label>
              <button type="submit">Sauvegarder</button>
            </form>
          </article>

          <article class="card">
            <div class="section-head">
              <div>
                <p class="section-tag">Operations</p>
                <h2>Actions rapides</h2>
              </div>
            </div>
            <div class="stack">
              <button id="check-now">Verifier maintenant</button>
              <button id="test-notification" class="secondary">Envoyer une notification de test</button>
              <button id="backup-download" class="ghost">Telecharger la sauvegarde</button>
            </div>
            <div id="admin-health" class="signal-grid admin-block"></div>
            <div id="admin-storage" class="summary-grid admin-block"></div>
          </article>
        </div>

        <div class="layout-two">
          <article class="card">
            <div class="section-head">
              <div>
                <p class="section-tag">Runtime</p>
                <h2>Etat technique</h2>
              </div>
            </div>
            <div id="admin-runtime" class="summary-grid"></div>
          </article>

          <article class="card">
            <div class="section-head">
              <div>
                <p class="section-tag">Database</p>
                <h2>Stockage & snapshots</h2>
              </div>
            </div>
            <div id="admin-database" class="summary-grid"></div>
          </article>
        </div>
      </section>

      <p id="flash" class="flash" hidden></p>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
  </html>
